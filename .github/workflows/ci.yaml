name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: PR — test + build only ────────────────────────────────
  test-and-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q || true

      - name: Build Docker image (validation only)
        run: docker build -t sample-fastapi-app:pr-${{ github.event.pull_request.number }} .

  # ─── Job 2: Merge to main — test + build + push ───────────────────
  test-build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q || true

      - name: Set image version tag
        id: version
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/sample-fastapi-app:${{ steps.version.outputs.tag }} .

      - name: Push Docker image with version tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sample-fastapi-app:${{ steps.version.outputs.tag }}

      - name: Print pushed image version
        run: |
          echo "==========================================="
          echo "Docker image successfully pushed:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/sample-fastapi-app:${{ steps.version.outputs.tag }}"
          echo "==========================================="

      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/devops-assignment-config
          token: ${{ secrets.GH_PAT }}
          path: devops-assignment-config

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|\(image: .*/sample-fastapi-app:\).*|\1${{ steps.version.outputs.tag }}|" \
            devops-assignment-config/deployment.yaml

      - name: Raise PR to config repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd devops-assignment-config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="update-image-${{ steps.version.outputs.tag }}"
          git checkout -b $BRANCH
          git add deployment.yaml
          git commit -m "chore: update image tag to ${{ steps.version.outputs.tag }}"
          git push origin $BRANCH
          gh pr create \
            --repo ${{ github.repository_owner }}/devops-assignment-config \
            --base main \
            --head $BRANCH \
            --title "chore: update image tag to ${{ steps.version.outputs.tag }}" \
            --body "Automated PR: update container image to \`${{ secrets.DOCKER_USERNAME }}/sample-fastapi-app:${{ steps.version.outputs.tag }}\`"
